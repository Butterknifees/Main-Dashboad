name: Daily Portfolio Update

on:
  schedule:
    - cron: '30 1 * * *' # 1:30 AM UTC = 7:00 AM IST daily
  workflow_dispatch: # Allows manual trigger from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update-portfolio:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1. Checkout the public repository (this repo) into the expected relative subdirectory
      - name: Checkout Public Repository
        uses: actions/checkout@v4
        with:
          path: Gemini/personal finance accounting

      # 2. Checkout the private repository containing the transaction spreadsheets and SQLite DB
      - name: Checkout Private Data Repository
        uses: actions/checkout@v4
        with:
          repository: Butterknifees/portfolio-data
          token: ${{ secrets.PAT_TOKEN }}
          path: private-data

      # 3. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 4. Install Dependencies
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests yfinance numpy nsepython

      # 5. Move/Copy private data files to the expected script paths
      - name: Prepare Workspace Paths
        run: |
          mkdir -p "Gemini/personal finance accounting/data"
          
          # Copy SQLite DB and Groww spreadsheet transactions
          if [ -f "private-data/nav_data.db" ]; then
            cp "private-data/nav_data.db" "Gemini/personal finance accounting/"
            echo "SQLite database copied successfully."
          else
            echo "SQLite database missing in private repo!"
          fi
          
          if [ -d "private-data/data" ]; then
            cp -r private-data/data/* "Gemini/personal finance accounting/data/"
            echo "Transaction files copied successfully."
          else
            echo "Transaction files directory missing in private repo!"
          fi

          # Copy cached ETF/Stock CSVs if they exist to speed up run and prevent complete refetch
          [ -f "private-data/etf_historical_data.csv" ] && cp "private-data/etf_historical_data.csv" "Gemini/personal finance accounting/" || true
          [ -f "private-data/nifty_universe_historical_data.csv" ] && cp "private-data/nifty_universe_historical_data.csv" "Gemini/personal finance accounting/" || true

      # 6. Execute Python Pipeline
      - name: Run Pipeline Scripts
        run: |
          echo "Step 6a: Fetching ETF prices..."
          python "Gemini/personal finance accounting/fetch_etf_history.py"
          
          echo "Step 6b: Fetching Nifty Universe stock prices..."
          python "Gemini/personal finance accounting/fetch_nifty_universe.py"
          
          echo "Step 6c: Syncing TRI benchmark histories..."
          python "Gemini/personal finance accounting/sync_tri_benchmarks.py"
          
          echo "Step 6d: Updating Mutual Fund database..."
          python "Gemini/personal finance accounting/daily_tracker.py"
          
          echo "Step 6e: Running portfolio performance analysis..."
          python "Gemini/personal finance accounting/portfolio_analysis_v2.py"
          
          echo "Step 6f: Preparing simulator datasets..."
          python "Gemini/personal finance accounting/prepare_simulator.py"

      # 7. Push the public dashboard results back to the public repository
      - name: Commit and Push Public Repo Changes
        working-directory: Gemini/personal finance accounting
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add public-facing dashboard outputs and benchmarks
          git add dashboard_data.json
          git add simulator_data.json
          git add benchmark_tri_history.csv
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit in public repository."
          else
            git commit -m "Auto-update daily portfolio data (Run: $(date -u +'%Y-%m-%d %H:%M:%S' -d '+5 hours +30 minutes') IST)"
            git push origin main
            echo "Public dashboard successfully updated and pushed."
          fi

      # 8. Copy updated DB and downloaded cache CSVs back to private repo and push
      - name: Save Updated Data back to Private Repo
        run: |
          # Copy updated DB and cashflow price caches back to private repo folder
          cp "Gemini/personal finance accounting/nav_data.db" "private-data/"
          [ -f "Gemini/personal finance accounting/etf_historical_data.csv" ] && cp "Gemini/personal finance accounting/etf_historical_data.csv" "private-data/" || true
          [ -f "Gemini/personal finance accounting/nifty_universe_historical_data.csv" ] && cp "Gemini/personal finance accounting/nifty_universe_historical_data.csv" "private-data/" || true
          
          cd private-data
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add nav_data.db etf_historical_data.csv nifty_universe_historical_data.csv
          
          if git diff --cached --quiet; then
            echo "No database or cache updates to commit to private repository."
          else
            git commit -m "Auto-save updated SQLite database & historical price caches"
            git push origin main
            echo "Updated database and price cache successfully saved to private data repo."
          fi
